# Render Blueprint for poke-plaid-mcp
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo -> Apply
# Schema: https://render.com/schema/render.yaml.json
services:
  - type: web
    name: poke-plaid-mcp
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      # PLAID_ENV is harmless in mock mode; flip to `production` once you add keys.
      - key: PLAID_ENV
        value: sandbox
      # Secrets are generated by Render and never stored in git.
      # Grab MCP_API_KEY from the dashboard (Environment tab) to connect Poke.
      - key: MCP_API_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: SETUP_TOKEN
        generateValue: true
      # For REAL portfolio data, add these in the dashboard later (Environment tab),
      # then set PLAID_ENV=production and redeploy:
      #   PLAID_CLIENT_ID   = <your Plaid client_id>
      #   PLAID_SECRET      = <your Plaid production secret>
